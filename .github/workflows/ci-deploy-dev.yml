name: CI / Deploy Dev

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

# Top-level permissions for OIDC token (id-token) and repo checkout (contents).
# Each job that does NOT need AWS access only needs contents: read.
permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # ci: TypeScript type-check + ESLint
  # Runs on every PR and every push to develop.
  # ---------------------------------------------------------------------------
  ci:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/lambda-functions/package-lock.json

      - name: Install dev dependencies
        run: npm ci
        working-directory: src/lambda-functions

      - name: Install ingest-learning-events dependencies
        run: npm ci
        working-directory: src/lambda-functions/ingest-learning-events

      - name: Type-check (ingest-learning-events)
        run: npx tsc --noEmit
        working-directory: src/lambda-functions/ingest-learning-events

      - name: Lint
        run: npm run lint
        working-directory: src/lambda-functions

  # ---------------------------------------------------------------------------
  # build: Compile TypeScript and produce function.zip for every Lambda.
  # Runs in parallel with ci — deploy-dev waits for both.
  # ---------------------------------------------------------------------------
  build:
    name: Build Lambda functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/lambda-functions/package-lock.json

      - name: Install dev dependencies
        run: npm ci
        working-directory: src/lambda-functions

      - name: Build all Lambda functions
        run: ./build.sh
        working-directory: src/lambda-functions

      # Upload artifacts so deploy-dev can use them without rebuilding.
      # Paths are relative to the workspace root; directory structure is preserved.
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: |
            src/lambda-functions/health-check/function.zip
            src/lambda-functions/ingest-learning-events/function.zip
          retention-days: 1

  # ---------------------------------------------------------------------------
  # deploy-dev: Deploy to the dev environment via Terraform.
  # Only runs on push to develop (not on PRs).
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: [ci, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      # Restore the function.zip files into the exact workspace paths that
      # Terraform's local_source_path references.
      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: src/lambda-functions

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.12"

      - name: Terraform Init
        run: terraform init
        working-directory: iac/environments/dev

      - name: Terraform Plan
        run: terraform plan -out=tfplan -detailed-exitcode
        working-directory: iac/environments/dev
        env:
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Terraform Apply
        run: terraform apply tfplan
        working-directory: iac/environments/dev
