name: CI / Deploy Prod

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/lambda-functions/package-lock.json

      - name: Install dev dependencies
        run: npm ci
        working-directory: src/lambda-functions

      - name: Install ingest-learning-events dependencies
        run: npm ci
        working-directory: src/lambda-functions/ingest-learning-events

      - name: Type-check (ingest-learning-events)
        run: npx tsc --noEmit
        working-directory: src/lambda-functions/ingest-learning-events

      - name: Lint
        run: npm run lint
        working-directory: src/lambda-functions

  build:
    name: Build Lambda functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/lambda-functions/package-lock.json

      - name: Install dev dependencies
        run: npm ci
        working-directory: src/lambda-functions

      - name: Build all Lambda functions
        run: ./build.sh
        working-directory: src/lambda-functions

      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: |
            src/lambda-functions/health-check/function.zip
            src/lambda-functions/ingest-learning-events/function.zip
          retention-days: 1

  deploy-prod:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: [ci, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: src/lambda-functions

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.12"

      - name: Terraform Init
        run: terraform init
        working-directory: iac/environments/prod

      - name: Terraform Plan
        run: terraform plan -out=tfplan -detailed-exitcode
        working-directory: iac/environments/prod
        env:
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Terraform Apply
        run: terraform apply tfplan
        working-directory: iac/environments/prod
